<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Flap</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-wrapper">
        <div id="header-bar">
            <h2>PIXEL FLAP</h2>
            <div class="icon" id="store-btn" style="font-size: 1.5rem;" title="Mağaza">🛒</div>
        </div>
        
        <div id="game-container">
            <canvas id="gameCanvas" width="600" height="700"></canvas>
            
            <div id="start-screen" class="overlay">
                <h1 class="pixel-text">Hazır Mısın?</h1>
                <p>Zıplamak için tıkla</p>
            </div>
            
            <div id="store-screen" class="overlay hidden" style="z-index: 30;">
                <h1 class="pixel-text" style="font-size: 1.2rem; margin-top: -30px; text-shadow: 2px 2px 0 #000;">MAĞAZA</h1>
                <div id="skins-container"></div>
                <div id="close-store-btn" class="pixel-text">KAPAT</div>
            </div>

            <div id="game-over-screen" class="overlay hidden">
                <h1 class="pixel-text">Oyun Bitti!</h1>
                <p>Skor: <span id="final-score">0</span></p>
                <p class="highlight">En Yüksek: <span id="high-score">0</span></p>
                <p style="font-size: 0.5rem; margin-top: 15px;">Tekrar oynamak için tıkla</p>
            </div>
            
            <div id="score-display" class="pixel-text">0</div>
        </div>
        

    </div>
    <script src="script.js"></script>
</body>
</html>
